<script>

/* =========================================
   TRUE BIOCHEMISTRY BOOK POSITIONING
   USING TRIGONOMETRIC CIRCLE GEOMETRY
========================================= */

/* MAIN CONFIG */

const centerX = 900;
const centerY = 900;

const metaboliteRadius = 620;
const enzymeRadius = 760;
const cofactorRadius = 880;

/* METABOLITES */

const metabolites = [

{
name:"Citrate",
angle:-90,
className:"citrate"
},

{
name:"cis-Aconitate",
angle:-50,
className:"aconitate"
},

{
name:"Isocitrate",
angle:-10,
className:"isocitrate"
},

{
name:"α-Ketoglutarate",
angle:35,
className:"akg"
},

{
name:"Succinyl-CoA",
angle:75,
className:"succinyl"
},

{
name:"Succinate",
angle:120,
className:"succinate"
},

{
name:"Fumarate",
angle:165,
className:"fumarate"
},

{
name:"Malate",
angle:215,
className:"malate"
},

{
name:"Oxaloacetate",
angle:260,
className:"oxaloacetate"
}

];

/* ENZYMES */

const enzymes = [

{
name:"Aconitase",
angle:-70,
className:"e1"
},

{
name:"Aconitase",
angle:-30,
className:"e2"
},

{
name:"Isocitrate Dehydrogenase",
angle:12,
className:"e3"
},

{
name:"α-Ketoglutarate Dehydrogenase",
angle:55,
className:"e4"
},

{
name:"Succinyl-CoA Synthetase",
angle:95,
className:"e5"
},

{
name:"Succinate Dehydrogenase",
angle:145,
className:"e6"
},

{
name:"Fumarase",
angle:190,
className:"e7"
},

{
name:"Malate Dehydrogenase",
angle:240,
className:"e8"
},

{
name:"Citrate Synthase",
angle:285,
className:"e9"
}

];

/* COFACTORS */

const cofactors = [

{
name:"NADH + CO₂",
angle:18,
className:"n1"
},

{
name:"NADH + CO₂",
angle:58,
className:"n2"
},

{
name:"GTP",
angle:105,
className:"gtp"
},

{
name:"FADH₂",
angle:155,
className:"fadh"
},

{
name:"NADH",
angle:230,
className:"n3"
}

];

/* =========================================
   PLACE METABOLITES
========================================= */

metabolites.forEach(item => {

const rad =
item.angle * Math.PI / 180;

const x =
centerX +
metaboliteRadius * Math.cos(rad);

const y =
centerY +
metaboliteRadius * Math.sin(rad);

const element =
document.querySelector(
"." + item.className
);

element.style.left =
(x - 115) + "px";

element.style.top =
(y - 55) + "px";

});

/* =========================================
   PLACE ENZYMES
========================================= */

enzymes.forEach(item => {

const rad =
item.angle * Math.PI / 180;

const x =
centerX +
enzymeRadius * Math.cos(rad);

const y =
centerY +
enzymeRadius * Math.sin(rad);

const element =
document.querySelector(
"." + item.className
);

element.style.left =
(x - 70) + "px";

element.style.top =
(y - 20) + "px";

});

/* =========================================
   PLACE COFACTORS
========================================= */

cofactors.forEach(item => {

const rad =
item.angle * Math.PI / 180;

const x =
centerX +
cofactorRadius * Math.cos(rad);

const y =
centerY +
cofactorRadius * Math.sin(rad);

const element =
document.querySelector(
"." + item.className
);

element.style.left =
(x - 60) + "px";

element.style.top =
(y - 20) + "px";

});

/* =========================================
   TRUE SVG CIRCULAR ARC
========================================= */

const svg =
document.querySelector("svg");

const total =
metabolites.length;

for(let i=0;i<total;i++){

const start =
metabolites[i];

const end =
metabolites[(i+1)%total];

const startRad =
start.angle * Math.PI/180;

const endRad =
end.angle * Math.PI/180;

const x1 =
centerX +
metaboliteRadius *
Math.cos(startRad);

const y1 =
centerY +
metaboliteRadius *
Math.sin(startRad);

const x2 =
centerX +
metaboliteRadius *
Math.cos(endRad);

const y2 =
centerY +
metaboliteRadius *
Math.sin(endRad);

const path =
document.createElementNS(
"http://www.w3.org/2000/svg",
"path"
);

path.setAttribute(
"d",
`M ${x1} ${y1}
A ${metaboliteRadius}
${metaboliteRadius}
0 0 1
${x2} ${y2}`
);

path.setAttribute(
"fill",
"none"
);

path.setAttribute(
"stroke",
"white"
);

path.setAttribute(
"stroke-width",
"5"
);

path.setAttribute(
"class",
"flow"
);

path.setAttribute(
"marker-end",
"url(#arrow)"
);

svg.appendChild(path);

}

</script>
